<!DOCTYPE html>
<html>
<head>
  <title>Bible Reading Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .date {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.1s ease;
      display: block;
      color: black;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    .card:active {
      transform: scale(0.98);
      opacity: 0.85;
    }

    .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .passage {
      font-size: 22px;
      font-weight: 600;
    }

    .section {
      margin-top: 40px;
    }

    .small-row {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      color: #444;
    }

    .small-date {
      color: #999;
      font-size: 12px;
    }

    .youversion-btn {
      display: block;
      text-align: center;
      padding: 10px 14px;
      margin-top: -5px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
      background: #f2f2f5;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid #e0e0e5;
    }

    .youversion-btn:hover {
      background: #e9e9ee;
      color: #333;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="date" id="date"></div>

  <h1>Today's Reading</h1>

  <div id="ot"></div>
  <div id="ot-content" style="display:none; padding:18px; background:#fff; border-radius:12px; margin-bottom:20px;"></div>

  <div id="nt"></div>
  <div id="nt-content" style="display:none; padding:18px; background:#fff; border-radius:12px;"></div>

  <div class="section">
    <h2 style="font-size:18px;">Previous Days</h2>
    <div id="history"></div>
  </div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQL0KOv9kUHuO7eOQIxEowpKSlrpoA4EYcuAv1fQqGvVRxuYb6MZlujqXNL3X44HA/pub?output=csv";

const startDate = new Date("2025-09-18");

// ✅ FIXED: UTC-safe day calculation
function getDayNumber(date) {
  return Math.floor(Date.UTC(
    date.getFullYear(),
    date.getMonth(),
    date.getDate()
  ) / (1000 * 60 * 60 * 24));
}

const today = new Date();

const dayIndex =
  getDayNumber(today) -
  getDayNumber(startDate) -1;

const API_KEY = "AbC8akZ-xo2QD8jIu1M4T";
const BIBLE_ID = "78a9f6124f344018-01"; // NIV

document.getElementById("date").innerText =
  today.toLocaleDateString(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });

function normalize(passage) {
  return passage
    .replace("Is.", "Isaiah")
    .replace("Jn.", "John")
    .replace("Ps.", "Psalm")
    .replace("2 Cor.", "2 Corinthians")
    .replace("1 Cor.", "1 Corinthians")
    .replace("Gal.", "Galatians")
    .replace("Eph.", "Ephesians")
    .replace("Phil.", "Philippians")
    .replace("Col.", "Colossians")
    .replace("Rom.", "Romans");
}

function formatForAPI(passage) {
  passage = normalize(passage);
  const parts = passage.split(" ");
  let chapter = parts.pop();
  const book = parts.join(" ");

  // ✅ FIX: remove verses and ranges
  chapter = chapter.split(":")[0]; // 3:16 → 3
  chapter = chapter.split("-")[0]; // 5-7 → 5

  const map = {
    "Isaiah":"ISA","John":"JHN","Psalm":"PSA",
    "2 Corinthians":"2CO","1 Corinthians":"1CO",
    "Galatians":"GAL","Ephesians":"EPH",
    "Philippians":"PHP","Colossians":"COL","Romans":"ROM",
    "Matthew":"MAT","Mark":"MRK","Luke":"LUK","Acts":"ACT"
  };

  // ✅ safety fallback (prevents crash if book missing)
  if (!map[book]) {
    console.error("Book not mapped:", book);
    return "";
  }

  return `${map[book]}.${chapter}`;
}

async function fetchPassage(passage) {
  const formatted = formatForAPI(passage);

  const res = await fetch(`https://rest.api.bible/v1/bibles/${BIBLE_ID}/passages/${formatted}`, {
    headers: {
      "api-key": API_KEY,
      "Accept": "application/json"
    }
  });

  const data = await res.json();

  let content = data.data.content;
  content = content.replace(/<\/span>/g, '</span> ');

  return content;
}

function renderContent(content) {
  return `
    <div style="font-size:12px; color:#999; margin-bottom:10px;">
      New International Version (NIV)
    </div>

    <div style="font-size:16px; line-height:1.6;">
      ${content}
    </div>

    <div style="font-size:11px; color:#999; margin-top:20px;">
      Scripture taken from the Holy Bible, New International Version® NIV®.
      Copyright © 1973, 1978, 1984, 2011 by Biblica, Inc.®
      Used by permission. All rights reserved worldwide.
    </div>
  `;
}

function makeLink(passage) {
  const formatted = formatForAPI(passage);
  return `https://www.bible.com/bible/111/${formatted}`;
}

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n");

    const todayRow = rows[dayIndex + 2].split(",");

    document.getElementById("ot").innerHTML =
      `<div class="card" onclick="toggleOT()">
        <div class="label">Old Testament</div>
        <div class="passage">${normalize(todayRow[2])}</div>
      </div>
      <a href="${makeLink(todayRow[2])}" target="_blank" class="youversion-btn">
        Open in YouVersion (audio + additional versions)
      </a>`;

    document.getElementById("nt").innerHTML =
      `<div class="card" onclick="toggleNT()">
        <div class="label">New Testament</div>
        <div class="passage">${normalize(todayRow[1])}</div>
      </div>
      <a href="${makeLink(todayRow[1])}" target="_blank" class="youversion-btn">
        Open in YouVersion (audio + additional versions)
      </a>`;

    let historyHTML = "";
    for (let i = 1; i <= 7; i++) {
      const row = rows[dayIndex + 2 - i].split(",");
      const date = new Date(today);
      date.setDate(today.getDate() - i);

      historyHTML += `
        <div class="small-row">
          <div class="small-date">${date.toDateString()}</div>
          ${normalize(row[2])} • ${normalize(row[1])}
        </div>
      `;
    }

    document.getElementById("history").innerHTML = historyHTML;
  });

async function toggleOT() {
  const el = document.getElementById("ot-content");

  if (el.style.display === "block") {
    el.style.display = "none";
    return;
  }

  el.style.display = "block";
  el.innerHTML = "Loading...";

  const passage = document.querySelector("#ot .passage").innerText;
  const content = await fetchPassage(passage);

  el.innerHTML = renderContent(content);
}

async function toggleNT() {
  const el = document.getElementById("nt-content");

  if (el.style.display === "block") {
    el.style.display = "none";
    return;
  }

  el.style.display = "block";
  el.innerHTML = "Loading...";

  const passage = document.querySelector("#nt .passage").innerText;
  const content = await fetchPassage(passage);

  el.innerHTML = renderContent(content);
}
</script>

</body>
</html>
