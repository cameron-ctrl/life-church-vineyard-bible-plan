<!DOCTYPE html>
<html>
<head>
  <title>Bible Reading Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .date {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.1s ease;
      display: block;
      color: black;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    .card:active {
      transform: scale(0.98);
      opacity: 0.85;
    }

    .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .passage {
      font-size: 22px;
      font-weight: 600;
    }

    .section {
      margin-top: 40px;
    }

    .small-row {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      color: #444;
    }

    .small-date {
      color: #999;
      font-size: 12px;
    }

    .youversion-btn {
      display: block;
      text-align: center;
      padding: 10px 14px;
      margin-top: -5px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
      background: #f2f2f5;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid #e0e0e5;
    }

    .youversion-btn:hover {
      background: #e9e9ee;
      color: #333;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="date" id="date"></div>

  <h1>Today's Reading</h1>

  <div id="ot"></div>
  <div id="ot-content" style="display:none; padding:18px; background:#fff; border-radius:12px; margin-bottom:20px;"></div>

  <div id="nt"></div>
  <div id="nt-content" style="display:none; padding:18px; background:#fff; border-radius:12px;"></div>

  <div class="section">
    <h2 style="font-size:18px;">Previous Days</h2>
    <div id="history"></div>
  </div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQL0KOv9kUHuO7eOQIxEowpKSlrpoA4EYcuAv1fQqGvVRxuYb6MZlujqXNL3X44HA/pub?output=csv";

// ✅ FIXED start date (local-safe)
const startDate = new Date(2025, 8, 18);

// ✅ FIXED: LOCAL timezone day calculation
function getDayNumber(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0); // lock to user's local midnight
  return Math.floor(d.getTime() / (1000 * 60 * 60 * 24));
}

const today = new Date();

const dayIndex =
  getDayNumber(today) -
  getDayNumber(startDate);

const API_KEY = "AbC8akZ-xo2QD8jIu1M4T";
const BIBLE_ID = "78a9f6124f344018-01"; // NIV

document.getElementById("date").innerText =
  today.toLocaleDateString(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });

function normalize(passage) {

  return passage

    .replace("Gen.", "Genesis")

    .replace("Ex.", "Exodus")

    .replace("Lev.", "Leviticus")

    .replace("Num.", "Numbers")

    .replace("Deut.", "Deuteronomy")

    .replace("Josh.", "Joshua")

    .replace("Judg.", "Judges")

    .replace("1 Sam.", "1 Samuel")

    .replace("2 Sam.", "2 Samuel")

    .replace("1 Kings", "1 Kings")

    .replace("2 Kings", "2 Kings")

    .replace("1 Chron.", "1 Chronicles")

    .replace("2 Chron.", "2 Chronicles")

    .replace("Ezra", "Ezra")

    .replace("Neh.", "Nehemiah")

    .replace("Est.", "Esther")

    .replace("Job", "Job")

    .replace("Ps.", "Psalm")

    .replace("Prov.", "Proverbs")

    .replace("Eccl.", "Ecclesiastes")

    .replace("Song.", "Song of Songs")

    .replace("Is.", "Isaiah")

    .replace("Isa.", "Isaiah")

    .replace("Jer.", "Jeremiah")

    .replace("Lam.", "Lamentations")

    .replace("Ezek.", "Ezekiel")

    .replace("Dan.", "Daniel")

    .replace("Hos.", "Hosea")

    .replace("Obad.", "Obadiah")

    .replace("Mic.", "Micah")

    .replace("Nah.", "Nahum")

    .replace("Hab.", "Habakkuk")

    .replace("Zeph.", "Zephaniah")

    .replace("Hag.", "Haggai")

    .replace("Zech.", "Zechariah")

    .replace("Mal.", "Malachi")

    .replace("Matt.", "Matthew")

    .replace("Mk.", "Mark")

    .replace("Lk.", "Luke")

    .replace("Jn.", "John")

    .replace("Rom.", "Romans")

    .replace("1 Cor.", "1 Corinthians")

    .replace("2 Cor.", "2 Corinthians")

    .replace("Gal.", "Galatians")

    .replace("Eph.", "Ephesians")

    .replace("Phil.", "Philippians")

    .replace("Col.", "Colossians")

    .replace("1 Thess.", "1 Thessalonians")

    .replace("2 Thess.", "2 Thessalonians")

    .replace("1 Tim.", "1 Timothy")

    .replace("2 Tim.", "2 Timothy")

    .replace("Heb.", "Hebrews")

    .replace("Jas.", "James")

    .replace("1 Pet.", "1 Peter")

    .replace("2 Pet.", "2 Peter")

    .replace("1 Jn.", "1 John")

    .replace("2 Jn.", "2 John")

    .replace("3 Jn.", "3 John")

    .replace("Rev.", "Revelation");

}

function formatForAPI(passage) {

  passage = normalize(passage);

  const parts = passage.split(" ");

  let chapter = parts.pop();

  const book = parts.join(" ");

  chapter = chapter.split(":")[0];

  chapter = chapter.split("-")[0];

  const map = {

    "Genesis":"GEN","Exodus":"EXO","Leviticus":"LEV","Numbers":"NUM","Deuteronomy":"DEU",

    "Joshua":"JOS","Judges":"JDG","Ruth":"RUT","1 Samuel":"1SA","2 Samuel":"2SA",

    "1 Kings":"1KI","2 Kings":"2KI","1 Chronicles":"1CH","2 Chronicles":"2CH",

    "Ezra":"EZR","Nehemiah":"NEH","Esther":"EST","Job":"JOB","Psalm":"PSA","Psalms":"PSA",

    "Proverbs":"PRO","Ecclesiastes":"ECC","Song of Songs":"SNG","Isaiah":"ISA","Jeremiah":"JER",

    "Lamentations":"LAM","Ezekiel":"EZK","Daniel":"DAN","Hosea":"HOS","Joel":"JOL",

    "Amos":"AMO","Obadiah":"OBA","Jonah":"JON","Micah":"MIC","Nahum":"NAM",

    "Habakkuk":"HAB","Zephaniah":"ZEP","Haggai":"HAG","Zechariah":"ZEC","Malachi":"MAL",

    "Matthew":"MAT","Mark":"MRK","Luke":"LUK","John":"JHN","Acts":"ACT","Romans":"ROM",

    "1 Corinthians":"1CO","2 Corinthians":"2CO","Galatians":"GAL","Ephesians":"EPH",

    "Philippians":"PHP","Colossians":"COL","1 Thessalonians":"1TH","2 Thessalonians":"2TH",

    "1 Timothy":"1TI","2 Timothy":"2TI","Titus":"TIT","Philemon":"PHM","Hebrews":"HEB",

    "James":"JAS","1 Peter":"1PE","2 Peter":"2PE","1 John":"1JN","2 John":"2JN",

    "3 John":"3JN","Jude":"JUD","Revelation":"REV"

  };

  if (!map[book]) {

    console.error("Book not mapped:", book, "from passage:", passage);

    return "";

  }

  return `${map[book]}.${chapter}`;

}

async function fetchPassage(passage) {
  const formatted = formatForAPI(passage);

  const res = await fetch(`https://rest.api.bible/v1/bibles/${BIBLE_ID}/passages/${formatted}`, {
    headers: {
      "api-key": API_KEY,
      "Accept": "application/json"
    }
  });

  const data = await res.json();

  let content = data.data.content;
  content = content.replace(/<\/span>/g, '</span> ');

  return content;
}

function renderContent(content) {
  return `
    <div style="font-size:12px; color:#999; margin-bottom:10px;">
      New International Version (NIV)
    </div>

    <div style="font-size:16px; line-height:1.6;">
      ${content}
    </div>

    <div style="font-size:11px; color:#999; margin-top:20px;">
      Scripture taken from the Holy Bible, New International Version® NIV®.
      Copyright © 1973, 1978, 1984, 2011 by Biblica, Inc.®
      Used by permission. All rights reserved worldwide.
    </div>
  `;
}

function makeLink(passage) {
  const formatted = formatForAPI(passage);
  return `https://www.bible.com/bible/111/${formatted}`;
}

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n");

    const todayRow = rows[dayIndex + 2].split(",");

    document.getElementById("ot").innerHTML =
      `<div class="card" onclick="toggleOT()">
        <div class="label">Old Testament</div>
        <div class="passage">${normalize(todayRow[2])}</div>
      </div>
      <a href="${makeLink(todayRow[2])}" target="_blank" class="youversion-btn">
        Open in YouVersion (audio + additional versions)
      </a>`;

    document.getElementById("nt").innerHTML =
      `<div class="card" onclick="toggleNT()">
        <div class="label">New Testament</div>
        <div class="passage">${normalize(todayRow[1])}</div>
      </div>
      <a href="${makeLink(todayRow[1])}" target="_blank" class="youversion-btn">
        Open in YouVersion (audio + additional versions)
      </a>`;

    let historyHTML = "";
    for (let i = 1; i <= 7; i++) {
      const row = rows[dayIndex + 2 - i].split(",");
      const date = new Date(today);
      date.setDate(today.getDate() - i);

      historyHTML += `
        <div class="small-row">
          <div class="small-date">${date.toDateString()}</div>
          ${normalize(row[2])} • ${normalize(row[1])}
        </div>
      `;
    }

    document.getElementById("history").innerHTML = historyHTML;
  });

async function toggleOT() {
  const el = document.getElementById("ot-content");

  if (el.style.display === "block") {
    el.style.display = "none";
    return;
  }

  el.style.display = "block";
  el.innerHTML = "Loading...";

  const passage = document.querySelector("#ot .passage").innerText;
  const content = await fetchPassage(passage);

  el.innerHTML = renderContent(content);
}

async function toggleNT() {
  const el = document.getElementById("nt-content");

  if (el.style.display === "block") {
    el.style.display = "none";
    return;
  }

  el.style.display = "block";
  el.innerHTML = "Loading...";

  const passage = document.querySelector("#nt .passage").innerText;
  const content = await fetchPassage(passage);

  el.innerHTML = renderContent(content);
}
</script>

</body>
</html>
